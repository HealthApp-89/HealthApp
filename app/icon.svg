<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#15233f" />
      <stop offset="100%" stop-color="#080e1a" />
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a84ff" />
      <stop offset="100%" stop-color="#5e5ce6" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Maskable safe zone is the inner ~80% (radius ~205 of 256). All marks stay inside. -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <!-- Three-quarter ring echoing the hero gauges -->
  <circle
    cx="256" cy="256" r="148"
    fill="none"
    stroke="url(#ring)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-dasharray="700 1000"
    transform="rotate(-90 256 256)"
    filter="url(#glow)"
  />
  <!-- Pulse line through the center -->
  <polyline
    points="160,256 210,256 232,210 254,310 276,232 298,278 320,256 360,256"
    fill="none"
    stroke="#ffffff"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"
  />
</svg>
